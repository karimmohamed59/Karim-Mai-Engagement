<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Karim & Mai Engagement</title>

<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    background: linear-gradient(to top, #fff0f5, #ffe4ec);
    text-align: center;
    overflow-x: hidden;
}

/* Counters */
.counter {
    position: fixed;
    top: 15px;
    font-size: 18px;
    font-weight: bold;
    color: #b30059;
}
#yesCount { left: 20px; }
#noCount { right: 20px; }

/* Countdown */
#countdown {
    margin-top: 30px;
    font-size: 22px;
    color: #b30059;
    font-weight: bold;
}

/* Envelope */
.envelope {
    position: relative;
    width: 320px;
    height: 200px;
    background: #fff;
    margin: 120px auto;
    border-radius: 10px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    cursor: pointer;
    overflow: hidden;
}

.flap {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #ffb6c1;
    clip-path: polygon(0 0, 100% 0, 50% 50%);
    transform-origin: top;
    transition: 1s;
}

.envelope.open .flap {
    transform: rotateX(180deg);
}

/* Letter */
.letter {
    position: absolute;
    width: 90%;
    height: 90%;
    background: #fff;
    top: 5%;
    left: 5%;
    border-radius: 10px;
    transform: translateY(100%);
    transition: 1s;
}

.envelope.open .letter {
    transform: translateY(0);
}

/* Card */
.card {
    display: none;
    margin-top: 20px;
    background: white;
    padding: 25px;
    border-radius: 20px;
    width: 85%;
    max-width: 420px;
    margin-left: auto;
    margin-right: auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

/* Typing text */
.typing {
    display: inline-block;
    border-right: 2px solid #c9184a;
    white-space: nowrap;
    overflow: hidden;
    animation: blink 0.7s infinite;
}

@keyframes blink {
    50% { border-color: transparent; }
}

/* Romantic text */
h2 {
    background: linear-gradient(45deg, #ff4d6d, #c9184a);
    -webkit-background-clip: text;
    color: transparent;
}

p {
    color: #5a0033;
    font-size: 18px;
}

/* Ring */
.ring {
    font-size: 40px;
    margin-bottom: 10px;
    animation: sparkle 1.5s infinite alternate;
}

@keyframes sparkle {
    from { transform: scale(1) rotate(0deg); }
    to { transform: scale(1.2) rotate(10deg); }
}

/* Buttons */
button {
    margin: 10px;
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.yes {
    background: linear-gradient(45deg, #28a745, #5cd65c);
    color: white;
}

.no {
    background: linear-gradient(45deg, #dc3545, #ff6b6b);
    color: white;
}

button:hover {
    transform: scale(1.1);
}

a {
    display: inline-block;
    margin-top: 15px;
    text-decoration: none;
    background: linear-gradient(45deg, #007bff, #66b3ff);
    color: white;
    padding: 10px 18px;
    border-radius: 20px;
}

/* Hearts */
.heart {
    position: fixed;
    bottom: -20px;
    width: 15px;
    height: 15px;
    background: pink;
    transform: rotate(45deg);
    animation: floatUp 6s linear infinite;
}

.heart::before,
.heart::after {
    content: "";
    position: absolute;
    width: 15px;
    height: 15px;
    background: pink;
    border-radius: 50%;
}

.heart::before { top: -7px; left: 0; }
.heart::after { left: -7px; top: 0; }

@keyframes floatUp {
    0% {transform: translateY(0); opacity: 1;}
    100% {transform: translateY(-100vh); opacity: 0;}
}
</style>

</head>

<body>

<div id="yesCount" class="counter">Coming: 0</div>
<div id="noCount" class="counter">Not Coming: 0</div>

<div id="countdown"></div>

<div class="envelope" onclick="openEnvelope()">
    <div class="flap"></div>
    <div class="letter"></div>
</div>

<div id="card" class="card">
    <div class="ring">💍</div>

    <h2 id="names" class="typing"></h2>
    <p id="line1" class="typing"></p>
    <p id="line2" class="typing"></p>
    <p id="line3" class="typing"></p>

    <a href="https://maps.google.com" target="_blank">View Location</a>

    <div>
        <button class="yes" onclick="coming()">I am coming</button>
        <button class="no" onclick="notComing()">Not coming</button>
    </div>
</div>

<script>
let yes = 0;
let no = 0;

function openEnvelope() {
    document.querySelector('.envelope').classList.add('open');
    setTimeout(() => {
        document.getElementById('card').style.display = 'block';
        startTyping();
    }, 800);
}

/* Typing animation */
function typeText(element, text, delay) {
    let i = 0;
    setTimeout(() => {
        let interval = setInterval(() => {
            element.innerHTML += text.charAt(i);
            i++;
            if (i >= text.length) clearInterval(interval);
        }, 40);
    }, delay);
}

function startTyping() {
    typeText(document.getElementById("names"), "Karim ❤️ Mai", 0);
    typeText(document.getElementById("line1"), "We are pleased to invite you for our engagement", 1500);
    typeText(document.getElementById("line2"), "Date: April 18, 2026", 3500);
    typeText(document.getElementById("line3"), "Location: Your Venue Here", 5500);
}

/* Buttons */
function coming() {
    yes++;
    document.getElementById('yesCount').innerText = "Coming: " + yes;
    alert("Can't wait to celebrate together ❤️");
}

function notComing() {
    no++;
    document.getElementById('noCount').innerText = "Not Coming: " + no;
    alert("You’ll be missed 💔");
}

/* Countdown */
const eventDate = new Date("April 18, 2026 00:00:00").getTime();

setInterval(() => {
    const now = new Date().getTime();
    const diff = eventDate - now;

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / 1000 / 60) % 60);

    document.getElementById("countdown").innerHTML =
        "⏳ " + days + " days " + hours + " hrs " + minutes + " mins left";
}, 1000);

/* Hearts */
setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}, 200);
</script>

</body>
</html>
